name: Update Willow Stream

on:
  schedule:
    - cron: '0,30 * * * *' # കൃത്യം 30 മിനിറ്റ് ഇടവേളകളിൽ
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4 # ലേറ്റസ്റ്റ് വേർഷൻ

    - name: Set up Python
      uses: actions/setup-python@v5 # v4-ൽ നിന്ന് v5-ലേക്ക് മാറ്റി
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run willow.py
      run: python willow.py

    - name: Commit and push if there are changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add playlist1.m3u
        if ! git diff --cached --quiet; then
          git commit -m "Update playlist1.m3u stream"
          git push
        else
          echo "No changes to commit"
        fi
